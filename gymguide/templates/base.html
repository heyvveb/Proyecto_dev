<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMGUIDE | Quantum Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #030305;
            --surface: #0a0a12;
            --surface-2: #12121e;
            --cyan: #00F0FF;
            --red: #FF2A2A;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --text: #e5e7eb;
            --border: rgba(255,255,255,0.05);
            --glow: 0 0 20px rgba(0,240,255,0.3);
            --easing: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        .glass-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 80px;
            background: rgba(3,3,5,0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            color: #fff;
            text-decoration: none;
        }
        .logo-icon {
            width: 36px; height: 36px;
            border: 2px solid var(--cyan);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotate-logo 8s linear infinite;
            color: var(--cyan);
            font-size: 18px;
        }
        @keyframes rotate-logo { to { transform: rotate(360deg); } }
        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--gray-400);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s var(--easing);
            position: relative;
        }
        .nav-links a::before { content: '[ '; }
        .nav-links a::after { content: ' ]'; }
        .nav-links a:hover { color: var(--cyan); text-shadow: 0 0 10px rgba(0,240,255,0.5); }
        .search-form {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            transition: border-color 0.3s var(--easing);
        }
        .search-form:focus-within { border-color: rgba(0,240,255,0.3); box-shadow: 0 0 10px rgba(0,240,255,0.1); }
        .search-form input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 8px 12px;
            width: 180px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .search-form button {
            background: transparent;
            border: none;
            color: var(--gray-500);
            padding: 8px 12px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            transition: color 0.3s var(--easing);
        }
        .search-form button:hover { color: var(--cyan); }
        .cyber-btn {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            background: var(--cyan);
            color: var(--bg);
            border: none;
            padding: 10px 24px;
            cursor: pointer;
            transition: all 0.4s var(--easing);
            position: relative;
            overflow: hidden;
        }
        .cyber-btn:hover {
            box-shadow: var(--glow);
        }
        .cyber-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.6s var(--easing);
        }
        .cyber-btn:hover::before { transform: translateX(100%); }
        .cyber-btn-outline {
            background: transparent;
            color: var(--cyan);
            border: 2px solid var(--cyan);
        }
        .cyber-btn-outline:hover { background: rgba(0,240,255,0.1); }
        .cyber-btn-sm { padding: 6px 16px; font-size: 12px; }
        .cyber-btn-red {
            background: var(--red);
            color: #fff;
        }
        .cyber-btn-red:hover { box-shadow: 0 0 20px rgba(255,42,42,0.3); }
        .cyber-btn-green {
            background: #00ff88;
            color: var(--bg);
        }
        .cyber-btn-green:hover { box-shadow: 0 0 20px rgba(0,255,136,0.3); }
        main { padding-top: 80px; position: relative; z-index: 1; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 24px; }
        h1, h2, h3, h4 {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }
        h1 { font-size: 48px; }
        h2 { font-size: 32px; }
        h3 { font-size: 24px; }
        .glow-text { color: var(--cyan); text-shadow: 0 0 20px rgba(0,240,255,0.4); }
        .mono-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gray-500);
        }
        .card {
            background: rgba(18,18,30,0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.4s var(--easing);
        }
        .card:hover {
            border-color: rgba(0,240,255,0.3);
            box-shadow: 0 0 15px rgba(0,240,255,0.1);
        }
        .stat-number {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 48px;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0,240,255,0.4);
            transition: all 0.3s var(--easing);
        }
        .stat-number:hover { filter: hue-rotate(30deg); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(18,18,30,0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead { background: rgba(0,240,255,0.05); }
        th {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gray-400);
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: middle;
        }
        tr:hover td { background: rgba(0,240,255,0.02); }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .badge-active { background: rgba(0,255,136,0.15); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
        .badge-inactive { background: rgba(255,42,42,0.15); color: var(--red); border: 1px solid rgba(255,42,42,0.3); }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(0,240,255,0.1);
            color: var(--cyan);
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
        }
        .action-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--gray-400);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s var(--easing);
        }
        .btn-icon:hover { border-color: var(--cyan); color: var(--cyan); }
        .btn-icon.edit:hover { border-color: #00ff88; color: #00ff88; }
        .btn-icon.delete:hover { border-color: var(--red); color: var(--red); }
        .btn-icon.restore:hover { border-color: #ffaa00; color: #ffaa00; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(3,3,5,0.85);
            backdrop-filter: blur(8px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
        }
        .modal h2 { margin-bottom: 24px; }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--gray-500);
            font-size: 24px;
            cursor: pointer;
        }
        .modal-close:hover { color: var(--red); }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gray-400);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s var(--easing);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0,240,255,0.15);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group select { cursor: pointer; }
        .form-group select option { background: var(--surface); }
        .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .img-thumb {
            width: 40px; height: 40px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid var(--border);
        }
        .img-placeholder {
            width: 40px; height: 40px;
            background: var(--surface-2);
            border-radius: 6px;
            border: 1px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-500);
            font-size: 14px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-500);
        }
        .empty-state h3 { color: var(--gray-400); margin-bottom: 8px; }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text);
            z-index: 300;
            transform: translateY(120px);
            opacity: 0;
            transition: all 0.4s var(--easing);
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .toast.error { border-color: var(--red); box-shadow: 0 0 15px rgba(255,42,42,0.2); }

        .hero-section {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gray-400);
            margin-bottom: 24px;
        }
        .hero-badge .dot {
            width: 8px; height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .hero-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 120px;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.9;
        }
        .hero-title .line1 { color: #fff; display: block; }
        .hero-title .line2 { color: var(--cyan); text-shadow: 0 0 40px rgba(0,240,255,0.5); display: block; }
        .hero-sub {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            color: var(--gray-400);
            margin-top: 24px;
            max-width: 600px;
        }
        .floating-icons {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .float-icon {
            position: absolute;
            font-size: 32px;
            opacity: 0.15;
            color: var(--cyan);
        }
        .stat-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            margin-top: 60px;
            border-top: 1px solid var(--border);
            width: 100%;
            max-width: 800px;
        }
        .stat-item {
            padding: 24px 16px;
            text-align: center;
            border-right: 1px solid var(--border);
        }
        .stat-item:last-child { border-right: none; }
        .stat-item .num {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 48px;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0,240,255,0.4);
        }
        .stat-item .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gray-500);
            margin-top: 4px;
        }
        .section-title {
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .section-title h2 { margin: 0; }
        .section-title .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        .bar-chart { display: flex; gap: 12px; align-items: flex-end; min-height: 120px; padding: 20px 0; }
        .bar-item { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
        .bar {
            width: 100%;
            max-width: 60px;
            background: linear-gradient(180deg, var(--cyan), rgba(0,240,255,0.2));
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            transition: all 0.6s var(--easing);
            position: relative;
        }
        .bar:hover { opacity: 0.8; transform: scaleX(1.05); }
        .bar-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray-500);
            text-align: center;
        }
        .bar-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--cyan);
        }

        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .dash-card {
            background: rgba(18,18,30,0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .dash-card .num { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 36px; }
        .dash-card .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-500); margin-top: 4px; }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .mb-24 { margin-bottom: 24px; }
        .mt-24 { margin-top: 24px; }
        .gap-16 { gap: 16px; }
        .gap-8 { gap: 8px; }

        @media (max-width: 768px) {
            .glass-header { padding: 0 16px; }
            .nav-links { display: none; }
            .hero-title { font-size: 48px; }
            .grid-2, .grid-3, .grid-4, .dashboard-grid { grid-template-columns: 1fr; }
            .stat-strip { grid-template-columns: repeat(2, 1fr); }
            .stat-item:nth-child(2) { border-right: none; }
            .search-form input { width: 100px; }
        }
    </style>
</head>
<body>
    <header class="glass-header">
        <a href="/" class="logo">
            <span class="logo-icon">G</span>
            GYMGUIDE
        </a>
        <nav>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/influencers">Influencers</a></li>
                <li><a href="/rutinas">Rutinas</a></li>
                <li><a href="/suplementos">Suplementos</a></li>
                <li><a href="/ejercicios">Ejercicios</a></li>
                <li><a href="/dashboard">Dashboard</a></li>
            </ul>
        </nav>
        <form class="search-form" action="/search" method="get">
            <input type="text" name="q" placeholder="Buscar..." value="{{ q if q else '' }}">
            <button type="submit">Buscar</button>
        </form>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = '';

        function showToast(message, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = message;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function api(method, url, body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(API_BASE + url, opts);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: 'Error ' + res.status }));
                throw new Error(err.detail || 'Unknown error');
            }
            if (res.status === 204) return null;
            return res.json();
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        document.addEventListener('click', function(e) {
            document.querySelectorAll('.modal-overlay').forEach(m => {
                if (e.target === m) m.classList.remove('active');
            });
        });

        function fillForm(prefix, data) {
            for (const [key, val] of Object.entries(data)) {
                const el = document.getElementById(prefix + key);
                if (el) el.value = val ?? '';
            }
        }

        function resetForm(formId) {
            document.getElementById(formId).reset();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
